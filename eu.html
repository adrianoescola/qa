<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quero nota professor</title>
    <style>
        :root {
            --primary-color: #aeb4b9; /* Cor institucional */
            --accent-color: #880404;    /* Cor personalizada do aluno */
            --bg-light: #000000;
            --text-dark: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* Header da Empresa */
        header {
            background: #000000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .company-logo {
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        /* Perfil do Aluno (Mini Currículo) */
        .profile-container {
            max-width: 900px;
            margin: 40px auto;
            background: rgb(66, 63, 63);
            padding: 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .student-photo {
            width: 180px;
            height: 180px;
            border-radius: 15px;
            object-fit: cover;
            border: 4px solid var(--accent-color);
        }

        .student-info h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--primary-color);
        }

        .skills-tags {
            margin-top: 15px;
        }

        .skill {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        /* Seção de Trabalhos */
        .works-section {
            max-width: 900px;
            margin: 40px auto;
        }

        .works-title {
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .work-item {
            background: #353333;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #353333;
        }

        .work-item:hover {
            transform: scale(1.03);
        }

        .work-thumb {
            width: 100%;
            height: 180px;
            background: #353333; /* Placeholder para imagem do trabalho */
            object-fit: cover;
        }

        .work-desc {
            padding: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .profile-container { flex-direction: column; text-align: center; }
        }
    </style>
</head>
